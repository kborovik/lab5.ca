<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1200 630"
  width="1200"
  height="630"
>
  <!-- Background -->
  <rect width="1200" height="630" fill="#ffffff" />

  <!-- Subtle dot grid pattern (echoing the site's radial-gradient dots) -->
  <defs>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#1f883d" opacity="0.07" />
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#dots)" />

  <!-- Top accent bar — green -->
  <rect x="0" y="0" width="1200" height="5" fill="#1f883d" />

  <!-- Geometric accent — large faded pinwheel quadrant shapes in bottom-right -->
  <circle cx="1100" cy="580" r="180" fill="#0969da" opacity="0.03" />
  <circle cx="1020" cy="530" r="120" fill="#1f883d" opacity="0.04" />
  <circle cx="1140" cy="480" r="80" fill="#f9c513" opacity="0.05" />

  <!-- Pinwheel mark — positioned left-center for asymmetric layout -->
  <g transform="translate(100, 215) scale(1.8)">
    <g transform="translate(.025 .025)">
      <path
        fill="#f9c513"
        d="M75.242 94.909a13.912 13.912 0 0 1 0-19.668 27.81 27.81 0 0 1-39.331 0 13.907 13.907 0 0 1-19.668 19.668 55.688 55.688 0 0 0 78.667 0 13.912 13.912 0 0 1-19.668 0Z"
      />
      <path
        fill="#0969da"
        d="M94.909 16.242a55.626 55.626 0 0 0-78.667 78.667A13.907 13.907 0 0 1 35.91 75.241 27.811 27.811 0 0 1 75.241 35.91a13.907 13.907 0 0 0 19.668-19.668Z"
      />
      <circle
        cx="13.908"
        cy="13.908"
        r="13.908"
        fill="#1f883d"
        transform="translate(12.166 71.165)"
      />
      <path
        fill="#cf222e"
        d="M94.909 16.242A13.907 13.907 0 0 1 75.241 35.91a27.81 27.81 0 0 1 0 39.331 13.907 13.907 0 0 0 19.668 19.668 55.7 55.7 0 0 0 0-78.667Z"
      />
    </g>
  </g>

  <!-- Badge: AI Productivity Engineer -->
  <rect x="370" y="220" width="270" height="34" rx="17" fill="#1f883d" opacity="0.08" />
  <text
    x="505"
    y="243"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="14"
    font-weight="700"
    fill="#1f883d"
    letter-spacing="2"
  >
    AI PRODUCTIVITY ENGINEER
  </text>

  <!-- Name -->
  <text
    x="370"
    y="320"
    text-anchor="start"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="72"
    font-weight="700"
    fill="#1f2328"
    letter-spacing="-1.5"
  >
    Konstantin Borovik
  </text>

  <!-- Tagline -->
  <text
    x="370"
    y="380"
    text-anchor="start"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="24"
    font-weight="400"
    fill="#59636e"
    letter-spacing="0.2"
  >
    I modernize business operations with AI
  </text>
  <text
    x="370"
    y="415"
    text-anchor="start"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="24"
    font-weight="400"
    fill="#59636e"
    letter-spacing="0.2"
  >
    to make companies move faster
  </text>

  <!-- Domain -->
  <text
    x="370"
    y="490"
    text-anchor="start"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="22"
    font-weight="600"
    fill="#1f883d"
    letter-spacing="0.5"
  >
    lab5.ca
  </text>

  <!-- Separator line -->
  <rect x="370" y="460" width="60" height="3" rx="1.5" fill="#1f883d" opacity="0.4" />
</svg>
