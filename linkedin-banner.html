<!DOCTYPE html>
<!--
  Konstantin Borovik — LinkedIn Banner
  Dimensions: 1584 × 396 px

  To capture:
    1. Open in Chrome
    2. DevTools → Toggle device toolbar (Cmd+Shift+M) → set 1584 × 396
    3. In Elements panel, right-click <body> → "Capture node screenshot"

  LinkedIn profile photo placement:
    - Circular photo (~128px) overlaps the bottom-left of the banner
    - Content is shifted right to keep bottom-left clear
-->
<html>
<head>
  <meta charset="UTF-8">
  <title>Konstantin Borovik — LinkedIn Banner (1584 × 396)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1584px;
      height: 396px;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans',
                   Helvetica, Arial, sans-serif;
      background: #ffffff;
      position: relative;
    }

    /* Subtle dot grid */
    .bg-dots {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(0,0,0,0.045) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    /* Fade edges + faint blue glow (GCP blue) */
    .bg-glow {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, #ffffff 5%, transparent 25%, transparent 75%, #ffffff 95%),
        radial-gradient(ellipse at 55% 50%, rgba(66,133,244,0.06) 0%, transparent 55%);
    }

    /* ─── Layout ─────────────────────────────────────── */
    .wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      /* Shift content right to clear LinkedIn profile photo overlap */
      padding-left: 160px;
      gap: 20px;
    }

    /* ─── Badge ──────────────────────────────────────── */
    .badge {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #59636e;
    }

    /* ─── Headline ───────────────────────────────────── */
    .headline {
      font-size: 60px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: #1f2328;
      text-align: center;
    }

    .headline .accent { color: #4285f4; }

    /* ─── Flow row ───────────────────────────────────── */
    .flow {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 4px;
    }

    .flow-group {
      display: flex;
      gap: 10px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 17px;
      font-weight: 600;
      padding: 7px 18px;
      border-radius: 999px;
    }

    /* Business systems — neutral gray */
    .chip-biz {
      background: #f6f8fa;
      border: 1px solid #d1d9e0;
      color: #1f2328;
    }

    /* GCP tools — blue tint */
    .chip-gcp {
      background: #eff6ff;
      border: 1px solid #bdd4f0;
      color: #0550ae;
    }

    .chip .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .dot-gray   { background: #818b98; }
    .dot-blue   { background: #4285f4; }
    .dot-green  { background: #34a853; }
    .dot-yellow { background: #fbbc04; }
    .dot-red    { background: #ea4335; }

    /* Arrow between groups */
    .arrow {
      display: flex;
      align-items: center;
      color: #34a853;
    }

    .arrow svg {
      width: 40px;
      height: 24px;
    }
  </style>
</head>
<body>

  <div class="bg-dots"></div>
  <div class="bg-glow"></div>

  <div class="wrapper">

    <div class="badge">Tech Lead for Business Modernization</div>

    <div class="headline">
      Modernize your business with <span class="accent">Google Cloud</span>
    </div>

    <div class="flow">
      <div class="flow-group">
        <div class="chip chip-biz"><span class="dot dot-gray"></span>ERP</div>
        <div class="chip chip-biz"><span class="dot dot-gray"></span>CRM</div>
        <div class="chip chip-biz"><span class="dot dot-gray"></span>Email</div>
        <div class="chip chip-biz"><span class="dot dot-gray"></span>Documents</div>
      </div>

      <div class="arrow">
        <svg viewBox="0 0 40 24" fill="none">
          <path d="M2 12h32M28 5l8 7-8 7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <div class="flow-group">
        <div class="chip chip-gcp"><span class="dot dot-blue"></span>Cloud Run</div>
        <div class="chip chip-gcp"><span class="dot dot-green"></span>Vertex AI</div>
        <div class="chip chip-gcp"><span class="dot dot-red"></span>Pub/Sub</div>
        <div class="chip chip-gcp"><span class="dot dot-yellow"></span>Document AI</div>
      </div>
    </div>

  </div>

</body>
</html>
