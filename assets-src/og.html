<!DOCTYPE html>
<!--
  Konstantin Borovik — OG Social Preview Image
  Dimensions: 1200 × 630 px

  To capture (run from repo root):
    "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" \
      - -headless - -screenshot=public/og.png - -window-size=1200,630 assets-src/og.html
-->
<html>
<head>
  <meta charset="UTF-8">
  <title>Konstantin Borovik — OG Image (1200 × 630)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: 'Space Grotesk', sans-serif;
      background: #ffffff;
      position: relative;
    }

    /* ─── Background layers ──────────────────────────── */

    /* Subtle grid pattern */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
      background-size: 44px 44px;
    }

    /* Diagonal accent lines */
    .bg-diagonals {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .bg-diagonals::before {
      content: '';
      position: absolute;
      top: -50%;
      left: 25%;
      width: 1px;
      height: 200%;
      background: rgba(31, 136, 61, 0.1);
      transform: rotate(25deg);
    }

    .bg-diagonals::after {
      content: '';
      position: absolute;
      top: -50%;
      left: 32%;
      width: 1px;
      height: 200%;
      background: rgba(31, 136, 61, 0.06);
      transform: rotate(25deg);
    }

    /* Glow accents */
    .bg-glow {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 600px 400px at 70% 50%, rgba(31, 136, 61, 0.04) 0%, transparent 70%),
        radial-gradient(ellipse 400px 300px at 90% 75%, rgba(9, 105, 218, 0.03) 0%, transparent 70%),
        radial-gradient(ellipse 250px 200px at 95% 20%, rgba(249, 197, 19, 0.03) 0%, transparent 70%);
    }

    /* Noise grain overlay */
    .bg-noise {
      position: absolute;
      inset: 0;
      opacity: 0.4;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    /* ─── Geometric accents ──────────────────────────── */

    .geo-bracket {
      position: absolute;
      top: 60px;
      left: 350px;
      width: 80px;
      height: 80px;
      border-left: 2px solid rgba(31, 136, 61, 0.2);
      border-top: 2px solid rgba(31, 136, 61, 0.2);
    }

    .geo-bracket-2 {
      position: absolute;
      bottom: 60px;
      right: 60px;
      width: 70px;
      height: 70px;
      border-right: 2px solid rgba(31, 136, 61, 0.15);
      border-bottom: 2px solid rgba(31, 136, 61, 0.15);
    }

    .geo-dot {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .geo-dot-1 { top: 57px; left: 347px; background: #1f883d; }
    .geo-dot-2 { bottom: 57px; right: 57px; background: #1f883d; }
    .geo-dot-3 { top: 50%; left: 320px; transform: translateY(-50%); background: #0969da; opacity: 0.4; }
    .geo-dot-4 { top: 35%; left: 330px; background: #f9c513; opacity: 0.4; width: 4px; height: 4px; }
    .geo-dot-5 { top: 65%; left: 325px; background: #cf222e; opacity: 0.3; width: 4px; height: 4px; }

    /* Vertical status line */
    .status-line {
      position: absolute;
      left: 310px;
      top: 50px;
      bottom: 50px;
      width: 1px;
      background: linear-gradient(
        to bottom,
        transparent,
        rgba(31, 136, 61, 0.3) 30%,
        rgba(31, 136, 61, 0.3) 70%,
        transparent
      );
    }

    /* ─── Pinwheel mark ──────────────────────────────── */
    .pinwheel {
      position: absolute;
      left: 80px;
      top: 50%;
      transform: translateY(-50%);
      width: 180px;
      height: 180px;
    }

    .pinwheel svg {
      width: 100%;
      height: 100%;
    }

    /* ─── Color accent bars ──────────────────────────── */
    .accent-bars {
      position: absolute;
      right: 50px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .accent-bar {
      height: 3px;
      border-radius: 2px;
    }

    .accent-bar-1 { width: 48px; background: #0969da; opacity: 0.6; }
    .accent-bar-2 { width: 64px; background: #1f883d; opacity: 0.7; }
    .accent-bar-3 { width: 36px; background: #f9c513; opacity: 0.6; }
    .accent-bar-4 { width: 52px; background: #cf222e; opacity: 0.45; }

    /* ─── Layout ─────────────────────────────────────── */
    .wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100%;
      padding-left: 400px;
      padding-right: 140px;
      gap: 16px;
    }

    /* ─── Badge ──────────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #1f883d;
    }

    .badge::before {
      content: '';
      width: 8px;
      height: 8px;
      background: #1f883d;
      border-radius: 2px;
      transform: rotate(45deg);
    }

    /* ─── Headline ────────────────────────────────────── */
    .headline {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 52px;
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: #1f2328;
    }

    .headline .accent {
      color: #1f883d;
    }

    /* ─── Name ────────────────────────────────────────── */
    .name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      font-weight: 500;
      line-height: 1.4;
      color: #59636e;
      letter-spacing: 0;
    }

    /* ─── Domain ──────────────────────────────────────── */
    .domain {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 8px;
    }

    .domain-line {
      width: 40px;
      height: 2px;
      background: rgba(31, 136, 61, 0.4);
      border-radius: 1px;
    }

    .domain-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      font-weight: 500;
      color: #1f883d;
      letter-spacing: 0.04em;
    }

  </style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-diagonals"></div>
  <div class="bg-glow"></div>
  <div class="bg-noise"></div>

  <!-- Geometric accents -->
  <div class="geo-bracket"></div>
  <div class="geo-bracket-2"></div>
  <div class="geo-dot geo-dot-1"></div>
  <div class="geo-dot geo-dot-2"></div>
  <div class="geo-dot geo-dot-3"></div>
  <div class="geo-dot geo-dot-4"></div>
  <div class="geo-dot geo-dot-5"></div>
  <div class="status-line"></div>

  <!-- Pinwheel mark (actual brand SVG) -->
  <div class="pinwheel">
    <svg viewBox="0 0 111 111" fill="none" xmlns="http://www.w3.org/2000/svg">
      <g transform="translate(.025 .025)">
        <path fill="#f9c513" d="M75.242 94.909a13.912 13.912 0 0 1 0-19.668 27.81 27.81 0 0 1-39.331 0 13.907 13.907 0 0 1-19.668 19.668 55.688 55.688 0 0 0 78.667 0 13.912 13.912 0 0 1-19.668 0Z"/>
        <path fill="#0969da" d="M94.909 16.242a55.626 55.626 0 0 0-78.667 78.667A13.907 13.907 0 0 1 35.91 75.241 27.811 27.811 0 0 1 75.241 35.91a13.907 13.907 0 0 0 19.668-19.668Z"/>
        <circle cx="13.908" cy="13.908" r="13.908" fill="#1f883d" transform="translate(12.166 71.165)"/>
        <path fill="#cf222e" d="M94.909 16.242A13.907 13.907 0 0 1 75.241 35.91a27.81 27.81 0 0 1 0 39.331 13.907 13.907 0 0 0 19.668 19.668 55.7 55.7 0 0 0 0-78.667Z"/>
      </g>
    </svg>
  </div>

  <!-- Color accent bars -->
  <div class="accent-bars">
    <div class="accent-bar accent-bar-1"></div>
    <div class="accent-bar accent-bar-2"></div>
    <div class="accent-bar accent-bar-3"></div>
    <div class="accent-bar accent-bar-4"></div>
  </div>

  <div class="wrapper">

    <div class="badge">Software Engineer | DevOps Engineer</div>

    <div class="headline">
      Konstantin <span class="accent">Borovik</span>
    </div>

    <div class="name">Python &middot; Google Cloud &middot; LLM agents &middot; CI/CD</div>

    <div class="domain">
      <div class="domain-line"></div>
      <span class="domain-text">lab5.ca</span>
    </div>

  </div>

</body>
</html>
