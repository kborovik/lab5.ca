<!DOCTYPE html>
<!--
  Konstantin Borovik — LinkedIn Banner
  Dimensions: 1584 × 396 px

  To capture:
    1. Open in Chrome
    2. DevTools → Toggle device toolbar (Cmd+Shift+M) → set 1584 × 396
    3. In Elements panel, right-click <body> → "Capture node screenshot"

  LinkedIn profile photo placement:
    - Circular photo (~128px) overlaps the bottom-left of the banner
    - Content is shifted right to keep bottom-left clear
-->
<html>
<head>
  <meta charset="UTF-8">
  <title>Konstantin Borovik — LinkedIn Banner (1584 × 396)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1584px;
      height: 396px;
      overflow: hidden;
      font-family: 'IBM Plex Mono', monospace;
      background: #ffffff;
      position: relative;
    }

    /* ─── Background layers ──────────────────────────── */

    /* Subtle grid pattern */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
      background-size: 44px 44px;
    }

    /* Diagonal accent lines */
    .bg-diagonals {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .bg-diagonals::before {
      content: '';
      position: absolute;
      top: -50%;
      left: 30%;
      width: 1px;
      height: 200%;
      background: rgba(31, 136, 61, 0.1);
      transform: rotate(25deg);
    }

    .bg-diagonals::after {
      content: '';
      position: absolute;
      top: -50%;
      left: 38%;
      width: 1px;
      height: 200%;
      background: rgba(31, 136, 61, 0.06);
      transform: rotate(25deg);
    }

    /* Glow accents */
    .bg-glow {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 700px 350px at 75% 50%, rgba(31, 136, 61, 0.04) 0%, transparent 70%),
        radial-gradient(ellipse 500px 250px at 95% 70%, rgba(9, 105, 218, 0.03) 0%, transparent 70%),
        radial-gradient(ellipse 300px 200px at 98% 20%, rgba(249, 197, 19, 0.03) 0%, transparent 70%);
    }

    /* Noise grain overlay */
    .bg-noise {
      position: absolute;
      inset: 0;
      opacity: 0.4;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    /* ─── Geometric accents ──────────────────────────── */

    .geo-bracket {
      position: absolute;
      top: 50px;
      left: 420px;
      width: 90px;
      height: 90px;
      border-left: 2px solid rgba(31, 136, 61, 0.2);
      border-top: 2px solid rgba(31, 136, 61, 0.2);
    }

    .geo-bracket-2 {
      position: absolute;
      bottom: 50px;
      right: 80px;
      width: 70px;
      height: 70px;
      border-right: 2px solid rgba(31, 136, 61, 0.15);
      border-bottom: 2px solid rgba(31, 136, 61, 0.15);
    }

    .geo-dot {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .geo-dot-1 { top: 47px; left: 417px; background: #1f883d; }
    .geo-dot-2 { bottom: 47px; right: 77px; background: #1f883d; }
    .geo-dot-3 { top: 50%; left: 390px; transform: translateY(-50%); background: #0969da; opacity: 0.4; }
    .geo-dot-4 { top: 35%; left: 400px; background: #f9c513; opacity: 0.4; width: 4px; height: 4px; }
    .geo-dot-5 { top: 65%; left: 395px; background: #cf222e; opacity: 0.3; width: 4px; height: 4px; }

    /* Vertical status line */
    .status-line {
      position: absolute;
      left: 380px;
      top: 40px;
      bottom: 40px;
      width: 1px;
      background: linear-gradient(
        to bottom,
        transparent,
        rgba(31, 136, 61, 0.3) 30%,
        rgba(31, 136, 61, 0.3) 70%,
        transparent
      );
    }

    /* ─── Pinwheel mark (brand) ──────────────────────── */
    .pinwheel {
      position: absolute;
      right: 140px;
      top: 50%;
      transform: translateY(-50%);
      width: 180px;
      height: 180px;
      opacity: 0.05;
    }

    .pinwheel svg {
      width: 100%;
      height: 100%;
    }

    /* ─── Color accent bars ──────────────────────────── */
    .accent-bars {
      position: absolute;
      right: 50px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .accent-bar {
      height: 3px;
      border-radius: 2px;
    }

    .accent-bar-1 { width: 48px; background: #0969da; opacity: 0.6; }
    .accent-bar-2 { width: 64px; background: #1f883d; opacity: 0.7; }
    .accent-bar-3 { width: 36px; background: #f9c513; opacity: 0.6; }
    .accent-bar-4 { width: 52px; background: #cf222e; opacity: 0.45; }

    /* ─── Layout ─────────────────────────────────────── */
    .wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100%;
      padding-left: 480px;
      padding-right: 120px;
      gap: 18px;
    }

    /* ─── Badge ──────────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #1f883d;
    }

    .badge::before {
      content: '';
      width: 8px;
      height: 8px;
      background: #1f883d;
      border-radius: 2px;
      transform: rotate(45deg);
    }

    /* ─── Headline ───────────────────────────────────── */
    .headline {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 52px;
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: #1f2328;
    }

    .headline .accent {
      color: #1f883d;
    }

    .headline .dim {
      color: #59636e;
    }

    /* ─── Subline ────────────────────────────────────── */
    .subline {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 15px;
      font-weight: 400;
      color: #59636e;
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .subline .separator {
      width: 32px;
      height: 1px;
      background: rgba(89, 99, 110, 0.3);
    }

    .subline .tag {
      color: #0969da;
    }

  </style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-diagonals"></div>
  <div class="bg-glow"></div>
  <div class="bg-noise"></div>

  <!-- Geometric accents -->
  <div class="geo-bracket"></div>
  <div class="geo-bracket-2"></div>
  <div class="geo-dot geo-dot-1"></div>
  <div class="geo-dot geo-dot-2"></div>
  <div class="geo-dot geo-dot-3"></div>
  <div class="geo-dot geo-dot-4"></div>
  <div class="geo-dot geo-dot-5"></div>
  <div class="status-line"></div>

  <!-- Brand pinwheel mark -->
  <div class="pinwheel">
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M50 10 C50 10, 50 50, 50 50 C50 50, 30 10, 50 10Z" fill="#0969da"/>
      <path d="M90 50 C90 50, 50 50, 50 50 C50 50, 90 30, 90 50Z" fill="#1f883d"/>
      <path d="M50 90 C50 90, 50 50, 50 50 C50 50, 70 90, 50 90Z" fill="#f9c513"/>
      <path d="M10 50 C10 50, 50 50, 50 50 C50 50, 10 70, 10 50Z" fill="#cf222e"/>
    </svg>
  </div>

  <!-- Color accent bars -->
  <div class="accent-bars">
    <div class="accent-bar accent-bar-1"></div>
    <div class="accent-bar accent-bar-2"></div>
    <div class="accent-bar accent-bar-3"></div>
    <div class="accent-bar accent-bar-4"></div>
  </div>

  <div class="wrapper">

    <div class="badge">Software Engineer | DevOps Engineer</div>

    <div class="headline">
      Konstantin <span class="accent">Borovik</span>
    </div>

    <div class="subline">
      <span>Python</span>
      <span class="separator"></span>
      <span>Google Cloud</span>
      <span class="separator"></span>
      <span>LLM agents</span>
      <span class="separator"></span>
      <span class="tag">CI/CD</span>
    </div>

  </div>

</body>
</html>
